name: pg_manager_owner_app
description: Owner mobile app for PG Manager SaaS.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  provider: ^6.1.2
  go_router: ^14.2.7
  intl: ^0.19.0
  local_auth: ^2.3.0
  local_auth_android: ^1.0.46
  shared_preferences: ^2.3.3
  file_selector: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#0C0B2E"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
